function renderProducts(){
  grid.innerHTML="";
  products.forEach(function(p){
    var card=document.createElement("div");
    card.className="card";
    var hasDetail=p.science.length>0;
    var imgHtml=p.img?'<img src="'+p.img+'" alt="'+p.fullName+'">':'<div class="card-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="#B5A89D" stroke-width="1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v8M8 12h8"/></svg></div>';
    card.innerHTML='<div class="card-img">'+imgHtml+'</div>'
      +'<div class="card-line">'+p.line+'</div>'
      +'<div class="card-name" data-id="'+p.id+'">'+p.name+'</div>'
      +'<div class="card-benefit">'+p.benefit+'</div>'
      +'<div class="card-price">$'+p.price.toLocaleString("es-MX")+' MXN</div>'
      +'<div class="card-action" data-id="'+p.id+'"></div>'
      +(hasDetail?'<button class="btn-detail" data-id="'+p.id+'">Ver detalles</button>':'');
    grid.appendChild(card);
  });
  grid.querySelectorAll(".card-action").forEach(function(el){
    var id=parseInt(el.getAttribute("data-id"));
    renderCardAction(el,id);
  });
  grid.querySelectorAll(".btn-detail").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      openModal(parseInt(this.getAttribute("data-id")));
    });
  });
  grid.querySelectorAll(".card-name").forEach(function(el){
    el.style.cursor="pointer";
    el.addEventListener("click",function(e){
      e.stopPropagation();
      var id=parseInt(this.getAttribute("data-id"));
      var prod=products.find(function(p){return p.id===id});
      if(prod) openModal(id);
    });
  });
  grid.querySelectorAll(".card-img").forEach(function(el){
    el.addEventListener("click",function(e){
      e.stopPropagation();
      var card=this.closest(".card");
      var nameEl=card.querySelector(".card-name");
      if(nameEl){
        var id=parseInt(nameEl.getAttribute("data-id"));
        openModal(id);
      }
    });
  });
}

function renderCardAction(el,id){
  var item=cart.find(function(c){return c.id===id});
  if(item){
    el.innerHTML='<div class="card-qty-inline"><button class="cqi-btn" data-id="'+id+'" data-d="-1">&minus;</button><span class="cqi-val">'+item.qty+'</span><button class="cqi-btn" data-id="'+id+'" data-d="1">+</button></div>';
    el.querySelectorAll(".cqi-btn").forEach(function(btn){
      btn.addEventListener("click",function(e){
        e.stopPropagation();
        cardChangeQty(parseInt(this.getAttribute("data-id")),parseInt(this.getAttribute("data-d")));
      });
    });
  }else{
    el.innerHTML='<button class="btn-add" data-id="'+id+'">Agregar al carrito</button>';
    el.querySelector(".btn-add").addEventListener("click",function(e){
      e.stopPropagation();
      addToCart(parseInt(this.getAttribute("data-id")));
    });
  }
}

function refreshCardActions(){
  document.querySelectorAll(".card-action").forEach(function(el){
    var id=parseInt(el.getAttribute("data-id"));
    renderCardAction(el,id);
  });
}

function cardChangeQty(id,delta){
  var item=cart.find(function(c){return c.id===id});
  if(!item)return;
  item.qty+=delta;
  if(item.qty<1){cart=cart.filter(function(c){return c.id!==id});}
  updateCart();
  refreshCardActions();
}

function addToCart(id){
  var item=cart.find(function(c){return c.id===id;});
  if(item){item.qty++}
  else{
    var prod=products.find(function(p){return p.id===id;});
    cart.push({id:prod.id,name:prod.fullName,price:prod.price,qty:1,img:prod.img||""});
  }
  updateCart();
  refreshCardActions();
  showToast("Producto agregado al carrito");
}

function removeFromCart(id){
  cart=cart.filter(function(c){return c.id!==id;});
  updateCart();
}

function changeQty(id,delta){
  var item=cart.find(function(c){return c.id===id;});
  if(!item)return;
  item.qty+=delta;
  if(item.qty<1){removeFromCart(id);return}
  updateCart();
}

function getSubtotal(){return cart.reduce(function(s,c){return s+c.price*c.qty},0)}
function getShipping(){return cart.length===0?0:(getSubtotal()>=999?0:170)}
function getTotal(){return getSubtotal()+getShipping()}
function getCount(){return cart.reduce(function(s,c){return s+c.qty},0)}

function updateCart(){
  var count=getCount();
  cartBadge.textContent=count;
  cartBadge.classList.toggle("empty",count===0);

  if(cart.length===0){
    cartItemsEl.innerHTML='<p class="cart-empty">Tu carrito est\u00e1 vac\u00edo</p>';
  }else{
    cartItemsEl.innerHTML="";
    cart.forEach(function(c){
      var div=document.createElement("div");
      div.className="cart-item";
      var thumbHtml=c.img?'<div class="cart-item-thumb"><img src="'+c.img+'" alt="'+c.name+'"></div>':'<div class="cart-item-thumb"></div>';
      div.innerHTML=thumbHtml+'<div class="cart-item-info"><div class="cart-item-name">'+c.name+'</div><div class="cart-item-price">$'+c.price.toLocaleString("es-MX")+' MXN</div><div class="cart-qty"><button class="qty-btn" data-id="'+c.id+'" data-d="-1">&minus;</button><span class="qty-val">'+c.qty+'</span><button class="qty-btn" data-id="'+c.id+'" data-d="1">+</button></div></div><button class="remove-btn" data-id="'+c.id+'" aria-label="Eliminar"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      cartItemsEl.appendChild(div);
    });
    cartItemsEl.querySelectorAll(".qty-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        changeQty(parseInt(this.getAttribute("data-id")),parseInt(this.getAttribute("data-d")));
      });
    });
    cartItemsEl.querySelectorAll(".remove-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        removeFromCart(parseInt(this.getAttribute("data-id")));
      });
    });
  }
  var sub=getSubtotal();
  var ship=getShipping();
  cartSubtotalEl.textContent="$"+sub.toLocaleString("es-MX")+" MXN";
  if(cart.length===0){
    cartShippingEl.textContent="$0 MXN";
    cartShippingEl.classList.remove("cart-shipping-free");
  }else if(ship===0){
    cartShippingEl.textContent="Gratis";
    cartShippingEl.classList.add("cart-shipping-free");
  }else{
    cartShippingEl.textContent="$"+ship.toLocaleString("es-MX")+" MXN";
    cartShippingEl.classList.remove("cart-shipping-free");
  }
  cartTotalEl.textContent="$"+getTotal().toLocaleString("es-MX")+" MXN";

  /* refresh modal qty if open */
  var modalAction=document.getElementById("modalActionWrap");
  if(modalAction){
    var mid=parseInt(modalAction.getAttribute("data-id"));
    renderModalAction(modalAction,mid);
  }
}

function openCart(){
  cartSidebar.classList.add("open");
  overlayEl.classList.add("open");
  document.body.style.overflow="hidden";
}

function closeCart(){
  cartSidebar.classList.remove("open");
  overlayEl.classList.remove("open");
  document.body.style.overflow="";
}

document.getElementById("cartToggle").addEventListener("click",openCart);
document.getElementById("cartClose").addEventListener("click",closeCart);
overlayEl.addEventListener("click",closeCart);

      +p.science.map(function(s){return '<li>'+s+'</li>'}).join('')

      html+='<div class="selling-points"><h4>Puntos Clave</h4><ul>'

    html+='<div class="modal-tab-content" data-tab="resultado">'
      +'<h4>Resultados</h4><ul>'
      +p.results.map(function(s){return '<li>'+s+'</li>'}).join('')
      +'</ul></div>';

    html+='<div class="modal-tab-content" data-tab="uso">'
      +'<h4>Experiencia de Uso</h4><ul>'
      +p.usage.map(function(s){return '<li>'+s+'</li>'}).join('')
      +'</ul></div>';
  }

  modalEl.innerHTML=html;
  modalOverlay.classList.add("open");
  document.body.style.overflow="hidden";

  modalEl.querySelector("#modalClose").addEventListener("click",closeModal);

  /* inline qty selector in modal */
  var maw=modalEl.querySelector("#modalActionWrap");
  if(maw) renderModalAction(maw,p.id);

  /* inline image zoom */
  var modalImgWrap=modalEl.querySelector(".modal-img");
  if(modalImgWrap){
    modalImgWrap.addEventListener("click",function(e){
      e.stopPropagation();
      this.classList.toggle("zoomed");
    });
  }

  var tabs=modalEl.querySelectorAll(".modal-tab");
  tabs.forEach(function(tab){
    tab.addEventListener("click",function(){
      var target=this.getAttribute("data-tab");
      tabs.forEach(function(t){t.classList.remove("active")});
      this.classList.add("active");
      modalEl.querySelectorAll(".modal-tab-content").forEach(function(c){
        c.classList.toggle("active",c.getAttribute("data-tab")===target);
      });
    });
  });
}

function closeModal(){
  modalOverlay.classList.remove("open");
  if(!cartSidebar.classList.contains("open")){
    document.body.style.overflow="";
  }
}

modalOverlay.addEventListener("click",function(e){
  if(e.target===modalOverlay)closeModal();
});

var toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  toastEl.textContent=msg;
  toastEl.classList.add("show");
  toastTimer=setTimeout(function(){toastEl.classList.remove("show")},2500);
}

document.getElementById("btnWhatsapp").addEventListener("click",function(){
  if(cart.length===0){showToast("Tu carrito est\u00e1 vac\u00edo.");return}
  var sub=getSubtotal();
  var ship=getShipping();
  var lines=["Hola CROC M\u00e9xico! Me interesa hacer este pedido:\n"];
  cart.forEach(function(c){
    lines.push("- "+c.qty+" x "+c.name+" \u2014 $"+(c.price*c.qty).toLocaleString("es-MX")+" MXN");
  });
  lines.push("\nSubtotal: $"+sub.toLocaleString("es-MX")+" MXN");
  lines.push("Env\u00edo: "+(ship===0?"Gratis":"$"+ship.toLocaleString("es-MX")+" MXN"));
  lines.push("TOTAL: $"+getTotal().toLocaleString("es-MX")+" MXN");
  lines.push("\n\u00bfC\u00f3mo puedo pagar?");
  window.open("https://wa.me/524521110527?text="+encodeURIComponent(lines.join("\n")),"_blank");
});

/* ── Modal qty ── */
function renderModalAction(el,id){
  var item=cart.find(function(c){return c.id===id});
  if(item){
    el.innerHTML='<div class="modal-qty-wrap"><div class="modal-qty-inline"><button class="mqi-btn" data-id="'+id+'" data-d="-1">&minus;</button><span class="mqi-val">'+item.qty+'</span><button class="mqi-btn" data-id="'+id+'" data-d="1">+</button></div></div>';
    el.querySelectorAll(".mqi-btn").forEach(function(btn){
      btn.addEventListener("click",function(e){
        e.stopPropagation();
        var cid=parseInt(this.getAttribute("data-id"));
        var d=parseInt(this.getAttribute("data-d"));
        var ci=cart.find(function(c){return c.id===cid});
        if(!ci)return;
        ci.qty+=d;
        if(ci.qty<1){cart=cart.filter(function(c){return c.id!==cid});}
        updateCart();
        refreshCardActions();
      });
    });
  }else{
    el.innerHTML='<button class="modal-add" data-id="'+id+'">Agregar al carrito</button>';
    el.querySelector(".modal-add").addEventListener("click",function(e){
      e.stopPropagation();
      addToCart(parseInt(this.getAttribute("data-id")));
    });
  }
}

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    if(modalOverlay.classList.contains("open")){closeModal();return}
    closeCart();
  }
});

renderProducts();
</script>
</body>
